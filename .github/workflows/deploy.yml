name: Deploy to GitHub Pages

on:
  # Se ejecuta en cada push a main
  push:
    branches: [main]
  # Permite ejecutarlo manualmente desde la UI de GitHub Actions
  workflow_dispatch:

# Permisos necesarios para escribir en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; cancela el anterior si hay uno en curso
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Build de producción
      - name: Build
        run: npm run build

      # 5. Configurar GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. Subir el artefacto (carpeta dist/)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 7. Deploy a GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
